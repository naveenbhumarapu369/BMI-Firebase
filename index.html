<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <div class="cont">
        <div class="form">
            <div class="hedd">
                <h1>Create Account</h1>
                <p>Fill in the details to get started</p>
            </div>

            <form id="regForm">
                <label for="unm">Full Name</label>
                <input type="text" id="unm" placeholder="Enter your full name">

                <label for="eml">Email</label>
                <input type="email" id="eml" placeholder="Enter your email">

                <div class="vie">
                    <label for="pass">Password</label>
                    <p id="viewPass" style="cursor:pointer;">view</p>
                </div>

                <input type="password" id="pass" placeholder="Create your password">

                <p id="status"></p>

                <label for="Cpass">Confirm Password</label>
                <input type="password" id="Cpass" placeholder="Confirm your password">

                <div class="ckBox">
                    <input type="checkbox" id="tNc">
                    <label for="tNc">
                        I agree to the
                        <span>Terms of Service</span>
                        and
                        <span>Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" id="sub">Register</button>
            </form>

            <p>
                Already have an account?
                <span><a href="login.html">Login here</a></span>
            </p>
        </div>

        <div class="img"></div>
    </div>

    <script type="module" src="registration.js"></script>
</body>
</html>
