<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" href="changePassword.css">
</head>
<body>
    <div class="cont">
        <div class="img"></div>
        <div class="form">
            <div class="hedd">
                <a href="login.html"><--back to Login</a>
                <h1>Change Password</h1>
                <p>For your Security choose a Strong password that you haven't used before</p>
            </div>
            <form id="formPass">
                <div class="vie"><label for="eml">Email</label></div>
                <input type="email" id="eml" placeholder="Enter Your Email">
                <div class="vie"><label for="Npass"> New Password</label><p id="view">view</p></div>
                <input type="password" id="Npass" placeholder="Enter Your New password">
                <p id="status"></p>
                <div class="vie"><label for="CNpass"> Confirm New Password</label></div>
                <input type="password" id="CNpass" placeholder="Confirm Your New password">

                <button id="sub">Update Password</button>
                <div class="or"><div></div>or<div></div></div>
                <button class="google" type="button" id="back">Cancel</button>
            </form>
        </div>
        
    </div>
    <script type="module" src="changePassword1.js"></script>
</body>
</html>
